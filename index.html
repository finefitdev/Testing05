<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finefit</title>
<meta name="description" content="Finefit — projects, socials, games." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;700;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #050505;
    --bg-2: #0a0a0a;
    --fg: #ffffff;
    --dim: rgba(255, 255, 255, 0.55);
    --dimmer: rgba(255, 255, 255, 0.22);
    --line: rgba(255, 255, 255, 0.08);
    --line-2: rgba(255, 255, 255, 0.16);
    --glow-strong: 0 0 28px rgba(255, 255, 255, 0.55), 0 0 60px rgba(255, 255, 255, 0.25);
    --glow: 0 0 16px rgba(255, 255, 255, 0.45);
    --glow-soft: 0 0 8px rgba(255, 255, 255, 0.3);
    --cursor-x: 50%;
    --cursor-y: 50%;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(circle 600px at var(--cursor-x) var(--cursor-y), rgba(255,255,255,0.035), transparent 60%),
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,255,255,0.04), transparent 60%),
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(255,255,255,0.025), transparent 60%),
      var(--bg);
    background-attachment: fixed;
    min-height: 100vh;
    position: relative;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.012) 2px,
      rgba(255,255,255,0.012) 3px
    );
    pointer-events: none;
    z-index: 1;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 1;
  }

  ::selection { background: rgba(255,255,255,0.2); color: #fff; text-shadow: var(--glow); }

  /* Header */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 2rem;
    z-index: 100;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    background: rgba(5, 5, 5, 0.55);
    border-bottom: 1px solid var(--line);
  }

  .logo {
    text-decoration: none;
    color: var(--fg);
    font-family: 'Unbounded', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.22em;
    text-shadow: var(--glow-soft);
    cursor: pointer;
    transition: text-shadow 0.3s ease, letter-spacing 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
  }

  .logo .mark {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: var(--fg);
    box-shadow: var(--glow);
    transform: rotate(45deg);
    transition: transform 0.4s ease;
  }

  .logo:hover { text-shadow: var(--glow); letter-spacing: 0.26em; }
  .logo:hover .mark { transform: rotate(225deg); }

  nav { display: flex; gap: 2.25rem; }

  nav a {
    color: var(--dim);
    text-decoration: none;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.3s ease, text-shadow 0.3s ease;
    position: relative;
    padding: 0.25rem 0;
  }

  nav a::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: -6px;
    width: 0;
    height: 1px;
    background: var(--fg);
    box-shadow: var(--glow-soft);
    transition: width 0.3s ease, left 0.3s ease;
  }

  nav a:hover, nav a.active { color: var(--fg); text-shadow: var(--glow-soft); }
  nav a:hover::after, nav a.active::after { width: 100%; left: 0; }

  main {
    padding-top: 4.5rem;
    min-height: 100vh;
    position: relative;
    z-index: 2;
  }

  /* Page entrance */
  .fade-in {
    animation: fadeIn 0.6s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* HOME */
  .home {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 4.5rem);
    text-align: center;
    padding: 2rem;
    position: relative;
  }

  .home h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: clamp(4rem, 17vw, 15rem);
    letter-spacing: -0.045em;
    line-height: 0.9;
    text-shadow:
      0 0 30px rgba(255,255,255,0.55),
      0 0 80px rgba(255,255,255,0.3),
      0 0 140px rgba(255,255,255,0.18);
    animation: pulse 5s ease-in-out infinite;
  }

  .home .tag {
    margin-top: 2.5rem;
    color: var(--dim);
    font-size: 0.78rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    padding-left: 0.5em;
  }

  .home .hint {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    color: var(--dimmer);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    animation: blink 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% {
      text-shadow:
        0 0 30px rgba(255,255,255,0.55),
        0 0 80px rgba(255,255,255,0.3),
        0 0 140px rgba(255,255,255,0.18);
    }
    50% {
      text-shadow:
        0 0 45px rgba(255,255,255,0.7),
        0 0 110px rgba(255,255,255,0.4),
        0 0 180px rgba(255,255,255,0.22);
    }
  }

  @keyframes blink {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }

  /* PAGE LAYOUT */
  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 5rem 2rem 6rem;
  }

  .page-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    color: var(--dimmer);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .page-meta::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .page-title {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: clamp(2.75rem, 7vw, 5.5rem);
    letter-spacing: -0.03em;
    text-shadow: var(--glow);
    margin-bottom: 3.5rem;
    line-height: 1;
  }

  /* PROJECTS */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 1.25rem;
  }

  .project-card {
    border: 1px solid var(--line);
    padding: 2rem 1.75rem;
    background: rgba(255,255,255,0.015);
    transition: border-color 0.4s ease, background 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .project-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.12), transparent 70%);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .project-card:hover {
    border-color: var(--line-2);
    background: rgba(255,255,255,0.03);
    transform: translateY(-3px);
    box-shadow: var(--glow-soft);
  }

  .project-card:hover::before { opacity: 1; }

  .project-card .num {
    font-size: 0.7rem;
    color: var(--dimmer);
    letter-spacing: 0.3em;
  }

  .project-card h3 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 500;
    font-size: 1.25rem;
    margin: 1.25rem 0 0.75rem;
    letter-spacing: -0.01em;
  }

  .project-card p {
    color: var(--dim);
    font-size: 0.8rem;
    line-height: 1.7;
  }

  .project-card .status {
    margin-top: 1.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--dimmer);
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }

  .project-card .status::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--dimmer);
  }

  /* SOCIALS */
  .socials-list {
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--line);
  }

  .social-link {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.75rem 0.5rem;
    border-bottom: 1px solid var(--line);
    color: var(--fg);
    text-decoration: none;
    transition: padding 0.4s ease, background 0.4s ease;
    font-family: 'Unbounded', sans-serif;
    font-weight: 400;
    font-size: 1.4rem;
    letter-spacing: 0.02em;
    position: relative;
  }

  .social-link .handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
    margin-left: 1rem;
    letter-spacing: 0.05em;
  }

  .social-link .arrow {
    transition: transform 0.4s ease, text-shadow 0.4s ease;
    font-size: 1.25rem;
    color: var(--dim);
  }

  .social-link:hover {
    padding-left: 1.75rem;
    background: rgba(255,255,255,0.02);
  }
  .social-link:hover .arrow { transform: translateX(10px); color: var(--fg); text-shadow: var(--glow-soft); }
  .social-link:hover { text-shadow: var(--glow-soft); }

  .social-link .name-wrap {
    display: inline-flex;
    align-items: baseline;
    flex-wrap: wrap;
  }

  /* GAMES */
  .games-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .game-tab {
    border: 1px solid var(--line-2);
    background: rgba(255,255,255,0.02);
    padding: 0.85rem 1.5rem;
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg);
    text-shadow: var(--glow-soft);
    width: fit-content;
  }
  .game-tab::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--fg);
    box-shadow: var(--glow-soft);
    border-radius: 50%;
  }

  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .game-info {
    display: flex;
    gap: 3.5rem;
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .game-info b {
    font-weight: 500;
    color: var(--fg);
    text-shadow: var(--glow-soft);
    margin-left: 0.5rem;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
  }

  .canvas-frame {
    padding: 0.75rem;
    border: 1px solid var(--line-2);
    background: rgba(255,255,255,0.015);
    box-shadow: var(--glow-soft);
    position: relative;
  }

  .canvas-frame::before, .canvas-frame::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-color: var(--fg);
    border-style: solid;
  }
  .canvas-frame::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .canvas-frame::after { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  #snake-canvas {
    background: var(--bg-2);
    display: block;
    max-width: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .game-instructions {
    color: var(--dim);
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-align: center;
    text-transform: uppercase;
  }

  .game-instructions kbd {
    border: 1px solid var(--line-2);
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    margin: 0 0.15rem;
    color: var(--fg);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 3rem 2rem 2rem;
    color: var(--dimmer);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    position: relative;
    z-index: 2;
  }

  /* Responsive */
  @media (max-width: 700px) {
    header { padding: 1rem 1.25rem; }
    .logo { font-size: 0.85rem; letter-spacing: 0.18em; }
    nav { gap: 1.25rem; }
    nav a { font-size: 0.68rem; letter-spacing: 0.15em; }
    .page { padding: 3.5rem 1.25rem 4rem; }
    .home .tag { font-size: 0.65rem; letter-spacing: 0.35em; }
    .social-link { font-size: 1.1rem; padding: 1.4rem 0.5rem; }
    .social-link .handle { display: block; margin-left: 0; font-size: 0.65rem; margin-top: 0.25rem; }
    .game-info { gap: 1.75rem; }
  }
</style>
</head>
<body>

<header>
  <a href="/" class="logo" data-link aria-label="Finefit home">
    <span class="mark"></span>
    <span>FINEFIT</span>
  </a>
  <nav id="nav">
    <a href="/projects" data-link>Projects</a>
    <a href="/socials" data-link>Socials</a>
    <a href="/games" data-link>Games</a>
  </nav>
</header>

<main id="content"></main>

<script>
  // ---------- Cursor spotlight ----------
  document.addEventListener('mousemove', (e) => {
    document.documentElement.style.setProperty('--cursor-x', e.clientX + 'px');
    document.documentElement.style.setProperty('--cursor-y', e.clientY + 'px');
  });

  // ---------- Routing ----------
  const routes = {
    '/': renderHome,
    '/projects': renderProjects,
    '/socials': renderSocials,
    '/games': renderGames,
  };

  function getPath() {
    return window.location.pathname || '/';
  }

  function navigate(path) {
    if (getPath() === path) return;
    // tear down anything page-specific
    teardown();
    try {
      history.pushState({ path }, '', path);
    } catch (e) {
      // Sandboxed iframe — pushState may be blocked. Render anyway.
      window.__finefitPath = path;
    }
    render(path);
  }

  window.addEventListener('popstate', () => render(getPath()));

  // Intercept link clicks for client-side routing
  document.addEventListener('click', (e) => {
    const a = e.target.closest('a[data-link]');
    if (!a) return;
    e.preventDefault();
    navigate(a.getAttribute('href'));
  });

  function render(path) {
    path = path || window.__finefitPath || getPath();
    const handler = routes[path] || renderHome;
    const main = document.getElementById('content');
    main.classList.remove('fade-in');
    // re-trigger animation
    void main.offsetWidth;
    handler(main);
    main.classList.add('fade-in');

    // active nav
    document.querySelectorAll('#nav a').forEach((a) => {
      a.classList.toggle('active', a.getAttribute('href') === path);
    });
    // page title
    const titles = { '/': 'Finefit', '/projects': 'Projects · Finefit', '/socials': 'Socials · Finefit', '/games': 'Games · Finefit' };
    document.title = titles[path] || 'Finefit';
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function teardown() {
    if (window._snake && window._snake.stop) window._snake.stop();
  }

  // ---------- Pages ----------
  function renderHome(root) {
    root.innerHTML = `
      <section class="home">
        <h1>FINEFIT</h1>
        <p class="tag">design · build · play</p>
        <p class="hint">scroll down or pick a tab</p>
      </section>
    `;
  }

  function renderProjects(root) {
    const projects = [
      { num: '01', title: 'Project One', desc: 'Placeholder card — drop in your first project here.', status: 'In progress' },
      { num: '02', title: 'Project Two', desc: 'Another placeholder. Add a title, description, and link.', status: 'Coming soon' },
      { num: '03', title: 'Project Three', desc: 'Reserved slot. Swap this out whenever you are ready.', status: 'Coming soon' },
    ];

    root.innerHTML = `
      <section class="page">
        <div class="page-meta">
          <span>/ projects</span>
        </div>
        <h2 class="page-title">Projects</h2>
        <div class="projects-grid">
          ${projects.map(p => `
            <article class="project-card">
              <div>
                <div class="num">${p.num}</div>
                <h3>${p.title}</h3>
                <p>${p.desc}</p>
              </div>
              <span class="status">${p.status}</span>
            </article>
          `).join('')}
        </div>
      </section>
    `;
  }

  function renderSocials(root) {
    const socials = [
      { name: 'GitHub',    handle: '@finefit',   url: '#' },
      { name: 'Twitter',   handle: '@finefit',   url: '#' },
      { name: 'YouTube',   handle: '/finefit',   url: '#' },
      { name: 'Discord',   handle: 'finefit',    url: '#' },
      { name: 'Email',     handle: 'hello@finefit.dev', url: 'mailto:hello@finefit.dev' },
    ];

    root.innerHTML = `
      <section class="page">
        <div class="page-meta">
          <span>/ socials</span>
        </div>
        <h2 class="page-title">Socials</h2>
        <div class="socials-list">
          ${socials.map(s => `
            <a href="${s.url}" class="social-link" target="_blank" rel="noopener">
              <span class="name-wrap">
                <span>${s.name}</span>
                <span class="handle">${s.handle}</span>
              </span>
              <span class="arrow">→</span>
            </a>
          `).join('')}
        </div>
      </section>
    `;
  }

  function renderGames(root) {
    root.innerHTML = `
      <section class="page">
        <div class="page-meta">
          <span>/ games</span>
        </div>
        <h2 class="page-title">Games</h2>
        <div class="games-list">
          <div class="game-tab">Snake · Now Playing</div>
        </div>
        <div class="game-container">
          <div class="game-info">
            <div>Score<b id="snake-score">0</b></div>
            <div>Best<b id="snake-best">0</b></div>
          </div>
          <div class="canvas-frame">
            <canvas id="snake-canvas" width="440" height="440" aria-label="Snake game"></canvas>
          </div>
          <p class="game-instructions">
            <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> or <kbd>WASD</kbd> to move &nbsp;·&nbsp; <kbd>space</kbd> to restart
          </p>
        </div>
      </section>
    `;
    initSnake();
  }

  // ---------- Snake game ----------
  function initSnake() {
    const canvas = document.getElementById('snake-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const gridSize = 22;
    const cellSize = canvas.width / gridSize;

    let snake, dir, nextDir, food, score, gameOver, lastStep, speed, running, best;
    best = 0;
    const bestEl = document.getElementById('snake-best');
    const scoreEl = document.getElementById('snake-score');
    bestEl.textContent = best;

    function reset() {
      snake = [{x: 11, y: 11}, {x: 10, y: 11}, {x: 9, y: 11}];
      dir = {x: 1, y: 0};
      nextDir = {x: 1, y: 0};
      score = 0;
      gameOver = false;
      speed = 130;
      placeFood();
      updateScore();
    }

    function placeFood() {
      while (true) {
        food = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
        if (!snake.some(s => s.x === food.x && s.y === food.y)) break;
      }
    }

    function updateScore() {
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
      }
    }

    function step() {
      if (gameOver) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize || snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver = true;
        draw();
        return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        updateScore();
        placeFood();
        if (speed > 65) speed -= 2.5;
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      // background
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // grid
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      for (let i = 1; i < gridSize; i++) {
        ctx.beginPath();
        ctx.moveTo(i * cellSize + 0.5, 0);
        ctx.lineTo(i * cellSize + 0.5, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * cellSize + 0.5);
        ctx.lineTo(canvas.width, i * cellSize + 0.5);
        ctx.stroke();
      }

      // food (glowing dot)
      ctx.shadowBlur = 22;
      ctx.shadowColor = 'rgba(255,255,255,0.9)';
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(
        food.x * cellSize + cellSize / 2,
        food.y * cellSize + cellSize / 2,
        cellSize / 3.2,
        0, Math.PI * 2
      );
      ctx.fill();

      // snake
      snake.forEach((s, i) => {
        const isHead = i === 0;
        ctx.shadowBlur = isHead ? 22 : 10;
        ctx.shadowColor = 'rgba(255,255,255,0.7)';
        const alpha = isHead ? 1 : Math.max(0.45, 1 - (i / snake.length) * 0.55);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        const pad = isHead ? 1 : 2;
        ctx.fillRect(
          s.x * cellSize + pad,
          s.y * cellSize + pad,
          cellSize - pad * 2,
          cellSize - pad * 2
        );
      });
      ctx.shadowBlur = 0;

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.72)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.shadowBlur = 24;
        ctx.shadowColor = 'rgba(255,255,255,0.8)';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.font = '700 26px Unbounded, sans-serif';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 8);

        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.65)';
        ctx.font = '11px JetBrains Mono, monospace';
        ctx.fillText(`SCORE  ${score}      BEST  ${best}`, canvas.width / 2, canvas.height / 2 + 18);
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.fillText('PRESS SPACE TO RESTART', canvas.width / 2, canvas.height / 2 + 42);
      }
    }

    function loop(t) {
      if (!running) return;
      if (!lastStep) lastStep = t;
      if (t - lastStep > speed) {
        step();
        lastStep = t;
      }
      requestAnimationFrame(loop);
    }

    function onKey(e) {
      if (getPath() !== '/games') return;
      const k = e.key.toLowerCase();
      const map = {
        'arrowup':    {x: 0, y: -1},
        'w':          {x: 0, y: -1},
        'arrowdown':  {x: 0, y: 1},
        's':          {x: 0, y: 1},
        'arrowleft':  {x: -1, y: 0},
        'a':          {x: -1, y: 0},
        'arrowright': {x: 1, y: 0},
        'd':          {x: 1, y: 0},
      };
      if (map[k]) {
        const nd = map[k];
        // prevent 180 turns
        if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
        e.preventDefault();
      } else if (k === ' ' || e.key === ' ') {
        if (gameOver) reset();
        e.preventDefault();
      }
    }

    document.addEventListener('keydown', onKey);

    window._snake = {
      stop() {
        running = false;
        document.removeEventListener('keydown', onKey);
      }
    };

    reset();
    draw();
    running = true;
    requestAnimationFrame(loop);
  }

  // ---------- Boot ----------
  render(getPath());
</script>

</body>
</html>
